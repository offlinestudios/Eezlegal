<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EezLegal</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">EezLegal</div>
    <nav>
      <button class="nav-btn active">New chat</button>
      <button class="nav-btn">Search chats</button>
      <button class="nav-btn">Library</button>
    </nav>
    <div class="status" id="status">Checking API…</div>
  </aside>

  <main class="main">
    <section class="hero">
      <h1>What can I help with?</h1>
      <div class="cards">
        <div class="card"> <span>🗣️</span> <strong>Plain English</strong><small>Translate complex legal docs</small></div>
        <div class="card"> <span>📄</span> <strong>Document Generator</strong><small>Create professional legal docs</small></div>
        <div class="card"> <span>⚠️</span> <strong>Dispute Resolution</strong><small>Recover what you’re owed</small></div>
        <div class="card"> <span>🤝</span> <strong>Deal Advisor</strong><small>Get suggestions to win every deal</small></div>
      </div>
    </section>

    <section class="chat-wrap">
      <div id="chat" class="chat"></div>
      <form id="form" class="composer">
        <textarea id="prompt" rows="3" placeholder="Ask anything…"></textarea>
        <button id="send" type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="/script.js"></script>
</body>
</html>
